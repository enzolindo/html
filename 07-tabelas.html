<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabelas em HTML 5</title>
  </head>
  <body>
    <h1>Tabelas em HTML 5</h1>
    <table border="1">
      <thead>
        <tr>
          <th>Nome do Aluno</th>
          <th>Disciplina</th>
          <th>Nota Final</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Mambo</td>
          <td>Matemática</td>
          <td>1.00</td>
        </tr>
        <tr>
            <td>Tamamo Cross</td>
            <td>Matemática</td>
            <td>6.7</td>
        </tr>
        <tr>
            <td>Manhattan Cafe</td>
            <td>Matemática</td>
            <td>9.67</td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
            <td colspan="2"><strong>Média da Turma</strong></td>
            <td><strong>5.76</strong></td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
